name: Publish to NuGet

on:
  workflow_dispatch:

jobs:
  publish:

    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'
        
    - name: Setup versioning
      uses: dotnet/nbgv@master
      with:
        setAllVars: true

    - name: Restore dependencies
      run: dotnet restore template/TrellisAspTemplate.slnx

    - name: Build
      run: dotnet build template/TrellisAspTemplate.slnx --no-restore -c Release

    - name: Test
      run: dotnet test template/TrellisAspTemplate.slnx --no-build -c Release --filter-not-trait "Category=AntiCorruptionLayerTests" --report-trx

    - name: Pack template
      run: dotnet pack templatepack.csproj -c Release -o nupkg

    - name: Push to NuGet.org
      run: dotnet nuget push nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
